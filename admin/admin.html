<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Vox</title>

    <link rel="stylesheet" href="admin.css">
</head>

<body>  

<section id="vox">

    <h2>Admin Vox</h2>

    <p>Přihlášení do archivů Luna Mechanica</p>

    <form id="login-form">

        <input
            type="email"
            id="admin-email"
            placeholder="Admin email">

        <input
            type="password"
            id="admin-password"
            placeholder="Heslo">

        <button type="submit">
            Přihlásit se
        </button>

    </form>
    
    <a href="index.html" class="back-link">
    Návrat do archivu Luna Mechanica
</a>

<button id="logout-button">
    Odhlásit
</button>

<div class="filters">

    <select id="status-filter">

        <option value="all">
            Všechny objednávky
        </option>

        <option value="Nová">
            Nová
        </option>

        <option value="Potvrzená">
            Potvrzená
        </option>

        <option value="Ve výrobě">
            Ve výrobě
        </option>

        <option value="Hotovo">
            Hotovo
        </option>

    </select>

</div>

<div id="admin-panel"></div>

</section>

<script type="module" src="admin.js"></script>

</body>
</html>
