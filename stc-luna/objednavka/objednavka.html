<!DOCTYPE html>
<html lang="cs">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Objednávka</title>

    <link rel="stylesheet"
          href="objednavka.css">

</head>

<body>

    <div class="container">

        <div class="top-bar">

            <a href="../stc-luna.html"
               class="return-button">

                ← Návrat

            </a>

            <h1>Objednávka</h1>

        </div>

        <p class="subtitle">
            Nezávazná poptávka 3D tisku
        </p>

        <p class="subtitle">
            Po odeslání formuláře vás budeme následně kontaktovat
        </p>

        <p class="subtitle">
            ohledně ceny, materiálu a možností výroby.
        </p>

        <form id="orderForm">

            <!-- KONTAKT -->

            <div class="form-section">

                <h2>Kontaktní informace</h2>

                <div class="form-row">

                    <div class="form-group">

                        <label>Jméno</label>

                        <input type="text"
                               required>

                    </div>

                    <div class="form-group">

                        <label>Email</label>

                        <input type="email"
                               required>

                    </div>

                    <div class="form-group">

                        <label>Telefon</label>

                        <input type="tel">

                    </div>

                </div>

            </div>

            <!-- MODEL -->

            <div class="form-section">

<h2>Informace o modelu</h2>

<!-- MODEL -->

<div class="form-row">

    <div class="form-group">

        <label>Model</label>

        <input type="text"
               id="modelInput"
               required>

    </div>

    <div class="form-group quantity-group">

    <label>Počet kusů</label>

    <input type="number"
           id="quantityInput"
           value="1"
           min="1">

</div>

</div>

<!-- MATERIÁLY -->

<div class="form-row">

    <div class="form-group">

        <label>Materiál</label>

        <select id="materialSelect">

            <option value="">
                Vyberte materiál
            </option>

        </select>

    </div>

    <div class="form-group">

        <label>Druh materiálu</label>

        <select id="manufacturerSelect">

            <option value="">
                Vyberte druh
            </option>

        </select>

    </div>

    <div class="form-group">

        <label>Barva</label>

        <select id="colorSelect">

            <option value="">
                Vyberte barvu
            </option>

        </select>

    </div>

</div>

                <!-- CENA -->

                <div class="price-box">

                    <span class="price-label">
                        Předběžná cena
                    </span>

                    <span class="price-value">
                        0 Kč
                    </span>

                </div>

                <!-- POZNÁMKA -->

                <div class="form-group">

                    <label>Poznámka</label>

                    <textarea rows="5"></textarea>

                </div>

            </div>

            <!-- ODESLÁNÍ -->

            <button type="submit">

                Odeslat nezávaznou objednávku

            </button>

        </form>

    </div>

    <script src="objednavka.js"></script>

</body>

</html>
