<!DOCTYPE html>
<html lang="cs">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Objednávka - Luna Mechanica</title>

<link rel="stylesheet" href="objednavka.css">

</head>

<body>

<h1>Objednávka</h1>

<a href="kosik.html" class="return-button">
    ← Zpět do košíku
</a>

<hr>

<section class="order-box">

    <h2>Kontaktní údaje</h2>

    <input
        type="text"
        id="customer-name"
        placeholder="Jméno a příjmení">

    <input
        type="email"
        id="customer-email"
        placeholder="E-mail">

    <input
        type="tel"
        id="customer-phone"
        placeholder="Telefon">

</section>

<section class="order-box">

    <h2>Adresa</h2>

    <input
        type="text"
        id="customer-street"
        placeholder="Ulice a číslo popisné">

    <input
        type="text"
        id="customer-city"
        placeholder="Město">

    <input
        type="text"
        id="customer-zip"
        placeholder="PSČ">

</section>

<section class="order-box">

    <h2>Doprava</h2>

    <select
    id="delivery"
    onchange="updateDelivery()">

        <option value="">
            Vyberte dopravu
        </option>

        <option value="Osobní odběr">
            Osobní odběr
        </option>

        <option value="Zásilkovna">
            Zásilkovna
        </option>

        <option value="Balíkovna">
            Balíkovna
        </option>
        <option value="PPL">
            PPL
        </option>

    </select>

</section>

<section class="order-box">

    <h2>Poznámka</h2>

    <textarea
        id="customer-note"
        rows="5"
        placeholder="Poznámka k objednávce">
    </textarea>

</section>

<section class="order-box">

    <h2>Rekapitulace objednávky</h2>

    <div id="order-items">

    </div>

    <hr>

   <div id="order-subtotal">

    Zboží: 0 Kč

</div>

<div id="delivery-price">

    Doprava: 0 Kč

</div>

<hr>

<div id="order-total">

    Celkem: 0 Kč

</div>

</section>
<div class="terms-box">

    <label>

        <input
            type="checkbox"
            id="terms">

        Souhlasím s obchodními podmínkami

    </label>

</div>
<button
    class="submit-button"
    onclick="submitOrder()">

    Odeslat objednávku

</button>

<script type="module" src="objednavka.js"></script>

</body>

</html>
