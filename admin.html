<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Vox</title>

    <link rel="stylesheet" href="webstyle/zprava.css">
</head>

<body>  

<section id="vox">

    <h2>Admin Vox</h2>

    <p>Přihlášení do archivů Luna Mechanica</p>

    <form id="login-form">

            type="email"
            id="admin-email"
            placeholder="Admin email">

        <input
            type="password"
            id="admin-password"
            placeholder="Heslo">

        <button type="submit">
            Přihlásit se
        </button>

    </form>
    
    <a href="index.html" class="back-link">
    Návrat do archivu Luna Mechanica
</a>

<button id="logout-button">
    Odhlásit
</button>

    <div id="admin-panel"></div>

</section>

</html>
